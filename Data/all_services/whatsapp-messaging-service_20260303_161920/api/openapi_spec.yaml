            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/bots/{botId}:
    get:
      summary: Get bot
      description: Retrieve a bot by ID.
      operationId: getBot
      tags:
      - Bots
      parameters:
      - name: botId
        in: path
        required: true
        description: Bot ID
        schema:
          type: string
      responses:
        '200':
          description: OK - Includes rate limit headers X-RateLimit-Limit, X-RateLimit-Remaining,
            X-RateLimit-Reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotResponse'
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update bot
      description: Update bot metadata and status.
      operationId: updateBot
      tags:
      - Bots
      parameters:
      - name: botId
        in: path
        required: true
        description: Bot ID
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBotRequest'
      responses:
        '200':
          description: OK - Includes rate limit headers X-RateLimit-Limit, X-RateLimit-Remaining,
            X-RateLimit-Reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BotResponse'
        '400':
          description: Bad Request - Invalid bot update payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete bot
      description: Delete a bot and revoke its access.
      operationId: deleteBot
      tags:
      - Bots
      parameters:
      - name: botId
        in: path
        required: true
        description: Bot ID
        schema:
          type: string
      responses:
        '200':
          description: OK - Includes rate limit headers X-RateLimit-Limit, X-RateLimit-Remaining,
            X-RateLimit-Reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteBotResponse'
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found - Bot not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/bots/batch:
    post:
      summary: Batch create bots
      description: Create multiple bots in a single request for high-volume onboarding.
      operationId: batchCreateBots
      tags:
      - Bots
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchCreateBotsRequest'
      responses:
        '201':
          description: Created - Includes rate limit headers X-RateLimit-Limit, X-RateLimit-Remaining,
            X-RateLimit-Reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCreateBotsResponse'
        '400':
          description: Bad Request - Invalid batch payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
